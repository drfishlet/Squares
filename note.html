<html>
<head>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #FFFDE7;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .title {
            user-select: none;
            height: 32px;
            background-color: rgba(0,0,0,0.12);
            width: 100%;
            cursor: grab;
            display: flex;
            align-items: center;
            padding: 0 6px;
            flex-shrink: 0;
        }

        .title:active {
            cursor: grabbing;
        }

        /* Prevent drag on interactive elements inside the title bar */
        .title-btn {
            -webkit-app-region: no-drag;
        }

        .title-input {
            -webkit-app-region: no-drag;
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 13px;
            color: rgba(0,0,0,0.6);
            font-family: sans-serif;
            padding: 0 4px;
            cursor: text;
        }

        .title-input::placeholder {
            color: rgba(0,0,0,0.35);
        }

        .color-btn {
            width: 22px;
            height: 22px;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            opacity: 0.65;
            transition: opacity 0.15s;
        }

        .color-btn:hover {
            opacity: 1;
            background: rgba(0,0,0,0.08);
        }

        .color-btn svg {
            width: 16px;
            height: 16px;
        }

        .pin-btn {
            width: 22px;
            height: 22px;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            opacity: 0.4;
            transition: opacity 0.15s;
            -webkit-app-region: no-drag;
        }

        .pin-btn:hover {
            opacity: 0.75;
            background: rgba(0,0,0,0.08);
        }

        .pin-btn.pinned {
            opacity: 1;
        }

        .pin-btn svg {
            width: 15px;
            height: 15px;
        }

        .close-btn {
            width: 28px;
            height: 28px;
            border: 1px solid rgba(0,0,0,0.2);
            background: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            opacity: 0.5;
            transition: opacity 0.15s, background 0.15s;
            -webkit-app-region: no-drag;
            flex-shrink: 0;
        }

        .close-btn:hover {
            opacity: 1;
            background: rgba(200,0,0,0.15);
            border-color: rgba(200,0,0,0.4);
        }

        .close-btn svg {
            width: 14px;
            height: 14px;
        }

        .color-picker-popup {
            position: fixed;
            top: 36px;
            left: 6px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.22);
            padding: 8px;
            display: none;
            z-index: 9999;
            flex-direction: column;
            gap: 6px;
        }

        .color-picker-popup.open {
            display: flex;
        }

        .swatches {
            display: grid;
            grid-template-columns: repeat(5, 24px);
            gap: 5px;
        }

        .swatch {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.1s;
        }

        .swatch:hover {
            transform: scale(1.2);
            border-color: rgba(0,0,0,0.3);
        }

        .swatch.active {
            border-color: rgba(0,0,0,0.5);
            transform: scale(1.15);
        }

        .custom-row {
            display: flex;
            align-items: center;
            gap: 6px;
            border-top: 1px solid #eee;
            padding-top: 6px;
        }

        .custom-row label {
            font-size: 11px;
            color: #555;
            white-space: nowrap;
        }

        .custom-row input[type="color"] {
            width: 28px;
            height: 22px;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 1px;
            cursor: pointer;
            background: none;
        }

        .note-content {
            flex: 1;
            padding: 8px;
            overflow-y: auto;
        }

        .note-content [contenteditable] {
            outline: none;
            min-height: 100%;
            font-family: sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="title" data-tauri-drag-region>
        <div class="title-btn">
            <button class="color-btn" id="colorBtn" title="Change color">
                <!-- palette icon -->
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 8 6.5 8 8 8.67 8 9.5 7.33 11 6.5 11zm3-4C8.67 7 8 6.33 8 5.5S8.67 4 9.5 4s1.5.67 1.5 1.5S10.33 7 9.5 7zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 4 14.5 4s1.5.67 1.5 1.5S15.33 7 14.5 7zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 8 17.5 8s1.5.67 1.5 1.5S18.33 11 17.5 11z"/>
                </svg>
            </button>

            <div class="color-picker-popup" id="colorPopup">
                <div class="swatches" id="swatches"></div>
                <div class="custom-row">
                    <label>Custom</label>
                    <input type="color" id="customColor" value="#fffde7">
                </div>
            </div>
        </div>
        <button class="pin-btn" id="pinBtn" title="Keep on top">
            <!-- pin/thumbtack icon -->
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/>
            </svg>
        </button>
        <input class="title-input" type="text" placeholder="Untitled" maxlength="100">
        <button class="close-btn" id="closeBtn" title="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>

    <div class="note-content">
        <div contenteditable="true">Hello</div>
    </div>

    <script>
        const COLORS = [
            '#FFFDE7', // yellow (default)
            '#FFF9C4',
            '#FFECB3',
            '#FFE0B2',
            '#FFCCBC',
            '#F8BBD0',
            '#E1BEE7',
            '#C5CAE9',
            '#B3E5FC',
            '#B2DFDB',
            '#C8E6C9',
            '#DCEDC8',
            '#F5F5F5',
            '#ECEFF1',
            '#D7CCC8',
        ];

        // Close button
        document.getElementById('closeBtn').addEventListener('click', () => {
            window.__TAURI__.window.getCurrentWindow().close();
        });

        // Pin toggle
        const pinBtn = document.getElementById('pinBtn');
        let pinned = false;
        pinBtn.addEventListener('click', async () => {
            pinned = !pinned;
            pinBtn.classList.toggle('pinned', pinned);
            pinBtn.title = pinned ? 'Unpin' : 'Keep on top';
            await window.__TAURI__.window.getCurrentWindow().setAlwaysOnTop(pinned);
        });

        // Allow dragging the window by clicking and dragging the title input.
        // data-tauri-drag-region doesn't work through <input> elements, so we
        // detect a drag manually and hand it off to Tauri's startDragging().
        document.querySelector('.title-input').addEventListener('mousedown', (e) => {
            const startX = e.clientX;
            const startY = e.clientY;

            function onMove(e) {
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                if (Math.sqrt(dx * dx + dy * dy) > 4) {
                    cleanup();
                    document.querySelector('.title-input').blur();
                    window.__TAURI__.window.getCurrentWindow().startDragging();
                }
            }

            function cleanup() {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', cleanup);
            }

            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', cleanup);
        });

        const body = document.body;
        const popup = document.getElementById('colorPopup');
        const colorBtn = document.getElementById('colorBtn');
        const swatchContainer = document.getElementById('swatches');
        const customColor = document.getElementById('customColor');

        let activeColor = COLORS[0];

        function setColor(hex) {
            activeColor = hex;
            body.style.backgroundColor = hex;
            customColor.value = hex;
            // Update active swatch
            document.querySelectorAll('.swatch').forEach(s => {
                s.classList.toggle('active', s.dataset.color === hex);
            });
        }

        // Build swatches
        COLORS.forEach(color => {
            const s = document.createElement('button');
            s.className = 'swatch';
            s.style.backgroundColor = color;
            s.dataset.color = color;
            s.title = color;
            if (color === activeColor) s.classList.add('active');
            s.addEventListener('click', () => {
                setColor(color);
            });
            swatchContainer.appendChild(s);
        });

        // Custom color input
        customColor.addEventListener('input', () => {
            setColor(customColor.value);
        });

        // Toggle popup
        colorBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            popup.classList.toggle('open');
        });

        // Close popup when clicking outside
        document.addEventListener('click', (e) => {
            if (!popup.contains(e.target) && e.target !== colorBtn) {
                popup.classList.remove('open');
            }
        });

        // Init background
        body.style.backgroundColor = activeColor;
    </script>
</body>
</html>

<html>
<head>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #FFFDE7;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .title {
            user-select: none;
            height: 32px;
            background-color: rgba(0,0,0,0.12);
            width: 100%;
            cursor: grab;
            display: flex;
            align-items: center;
            padding: 0 6px;
            flex-shrink: 0;
        }

        .title:active {
            cursor: grabbing;
        }

        /* Prevent drag on interactive elements inside the title bar */
        .title-btn {
            -webkit-app-region: no-drag;
        }

        .title-input {
            -webkit-app-region: no-drag;
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 13px;
            color: rgba(0,0,0,0.6);
            font-family: sans-serif;
            padding: 0 4px;
            cursor: text;
        }

        .title-input::placeholder {
            color: rgba(0,0,0,0.35);
        }

        .color-btn {
            width: 22px;
            height: 22px;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            opacity: 0.65;
            transition: opacity 0.15s;
        }

        .color-btn:hover {
            opacity: 1;
            background: rgba(0,0,0,0.08);
        }

        .color-btn svg {
            width: 16px;
            height: 16px;
        }

        .pin-btn {
            width: 22px;
            height: 22px;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            opacity: 0.4;
            transition: opacity 0.15s;
            -webkit-app-region: no-drag;
        }

        .pin-btn:hover {
            opacity: 0.75;
            background: rgba(0,0,0,0.08);
        }

        .pin-btn.pinned {
            opacity: 1;
        }

        .pin-btn svg {
            width: 15px;
            height: 15px;
        }

        .close-btn {
            width: 28px;
            height: 28px;
            border: 1px solid rgba(0,0,0,0.2);
            background: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            opacity: 0.5;
            transition: opacity 0.15s, background 0.15s;
            -webkit-app-region: no-drag;
            flex-shrink: 0;
        }

        .close-btn:hover {
            opacity: 1;
            background: rgba(200,0,0,0.15);
            border-color: rgba(200,0,0,0.4);
        }

        .close-btn svg {
            width: 14px;
            height: 14px;
        }

        .color-picker-popup {
            position: fixed;
            top: 36px;
            left: 6px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.22);
            padding: 8px;
            display: none;
            z-index: 9999;
            flex-direction: column;
            gap: 6px;
        }

        .color-picker-popup.open {
            display: flex;
        }

        .swatches {
            display: grid;
            grid-template-columns: repeat(5, 24px);
            gap: 5px;
        }

        .swatch {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.1s;
        }

        .swatch:hover {
            transform: scale(1.2);
            border-color: rgba(0,0,0,0.3);
        }

        .swatch.active {
            border-color: rgba(0,0,0,0.5);
            transform: scale(1.15);
        }

        .custom-row {
            display: flex;
            align-items: center;
            gap: 6px;
            border-top: 1px solid #eee;
            padding-top: 6px;
        }

        .custom-row label {
            font-size: 11px;
            color: #555;
            white-space: nowrap;
        }

        .custom-row input[type="color"] {
            width: 28px;
            height: 22px;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 1px;
            cursor: pointer;
            background: none;
        }

        .note-content {
            flex: 1;
            padding: 8px;
            overflow-y: auto;
        }

        .note-content [contenteditable] {
            outline: none;
            min-height: 100%;
            font-family: sans-serif;
            font-size: 14px;
        }

        /* Edges run the full length; corners sit on top (higher z-index) with a larger
           hit-zone, so a corner resize always wins near a corner — even when the cursor
           is hugging a horizontal or vertical edge. */
        .resize-handle {
            position: fixed;
            z-index: 10000;
        }
        .resize-n  { top: 0;    left: 0;  right: 0;  height: 8px; cursor: n-resize; }
        .resize-s  { bottom: 0; left: 0;  right: 0;  height: 8px; cursor: s-resize; }
        .resize-w  { left: 0;   top: 0;   bottom: 0; width: 8px;  cursor: w-resize; }
        .resize-e  { right: 0;  top: 0;   bottom: 0; width: 8px;  cursor: e-resize; }
        .resize-nw { top: 0;    left: 0;  width: 16px; height: 16px; cursor: nw-resize; z-index: 10001; }
        .resize-ne { top: 0;    right: 0; width: 16px; height: 16px; cursor: ne-resize; z-index: 10001; }
        .resize-sw { bottom: 0; left: 0;  width: 16px; height: 16px; cursor: sw-resize; z-index: 10001; }
        .resize-se { bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; z-index: 10001; }
    </style>
</head>
<body>
    <div class="resize-handle resize-n"  data-resize="North"></div>
    <div class="resize-handle resize-s"  data-resize="South"></div>
    <div class="resize-handle resize-w"  data-resize="West"></div>
    <div class="resize-handle resize-e"  data-resize="East"></div>
    <div class="resize-handle resize-nw" data-resize="NorthWest"></div>
    <div class="resize-handle resize-ne" data-resize="NorthEast"></div>
    <div class="resize-handle resize-sw" data-resize="SouthWest"></div>
    <div class="resize-handle resize-se" data-resize="SouthEast"></div>
    <div class="title" data-tauri-drag-region>
        <div class="title-btn">
            <button class="color-btn" id="colorBtn" title="Change color">
                <!-- palette icon -->
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 8 6.5 8 8 8.67 8 9.5 7.33 11 6.5 11zm3-4C8.67 7 8 6.33 8 5.5S8.67 4 9.5 4s1.5.67 1.5 1.5S10.33 7 9.5 7zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 4 14.5 4s1.5.67 1.5 1.5S15.33 7 14.5 7zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 8 17.5 8s1.5.67 1.5 1.5S18.33 11 17.5 11z"/>
                </svg>
            </button>

            <div class="color-picker-popup" id="colorPopup">
                <div class="swatches" id="swatches"></div>
                <div class="custom-row">
                    <label>Custom</label>
                    <input type="color" id="customColor" value="#fffde7">
                </div>
            </div>
        </div>
        <button class="pin-btn" id="pinBtn" title="Keep on top">
            <!-- pin/thumbtack icon -->
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/>
            </svg>
        </button>
        <input class="title-input" type="text" placeholder="Untitled" maxlength="100">
        <button class="close-btn" id="closeBtn" title="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>

    <div class="note-content">
        <div contenteditable="true"></div>
    </div>

    <script>
        const COLORS = [
            '#FFFDE7', // yellow (default)
            '#FFF9C4',
            '#FFECB3',
            '#FFE0B2',
            '#FFCCBC',
            '#F8BBD0',
            '#E1BEE7',
            '#C5CAE9',
            '#B3E5FC',
            '#B2DFDB',
            '#C8E6C9',
            '#DCEDC8',
            '#F5F5F5',
            '#ECEFF1',
            '#D7CCC8',
        ];

        // This note's identity + a helper to push changes to the central store (repo.ts,
        // running in the main window). The uuid is carried in the window label by StickyWin.
        const noteWin = window.__TAURI__.window.getCurrentWindow();
        const uuid = noteWin.label.replace(/^sticky-/, '');

        // While we're populating the UI from saved state on load, suppress reports so
        // hydration doesn't echo back as changes (which would re-stamp lastModified).
        let hydrating = true;
        function reportNote(patch) {
            if (hydrating) return Promise.resolve();
            return window.__TAURI__.event.emit('note:update', { uuid, ...patch });
        }

        // Close button: mark the note closed in the store (the data is kept), then
        // close the window. Await the emit so it isn't dropped as the webview tears down.
        document.getElementById('closeBtn').addEventListener('click', async () => {
            await reportNote({ isClosed: true });
            noteWin.close();
        });

        // Pin toggle
        const pinBtn = document.getElementById('pinBtn');
        let pinned = false;
        pinBtn.addEventListener('click', async () => {
            pinned = !pinned;
            pinBtn.classList.toggle('pinned', pinned);
            pinBtn.title = pinned ? 'Unpin' : 'Keep on top';
            await window.__TAURI__.window.getCurrentWindow().setAlwaysOnTop(pinned);
        });

        // Allow dragging the window by clicking and dragging the title input.
        // data-tauri-drag-region doesn't work through <input> elements, so we
        // detect a drag manually and hand it off to Tauri's startDragging().
        document.querySelector('.title-input').addEventListener('mousedown', (e) => {
            const startX = e.clientX;
            const startY = e.clientY;

            function onMove(e) {
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                if (Math.sqrt(dx * dx + dy * dy) > 4) {
                    cleanup();
                    document.querySelector('.title-input').blur();
                    window.__TAURI__.window.getCurrentWindow().startDragging();
                }
            }

            function cleanup() {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', cleanup);
            }

            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', cleanup);
        });

        const body = document.body;
        const popup = document.getElementById('colorPopup');
        const colorBtn = document.getElementById('colorBtn');
        const swatchContainer = document.getElementById('swatches');
        const customColor = document.getElementById('customColor');

        let activeColor = COLORS[0];

        // Visual-only colour change (no store report) — used during hydration.
        function applyColor(hex) {
            activeColor = hex;
            body.style.backgroundColor = hex;
            customColor.value = hex;
            // Update active swatch
            document.querySelectorAll('.swatch').forEach(s => {
                s.classList.toggle('active', s.dataset.color === hex);
            });
        }

        // User-driven colour change: update visuals and report to the store.
        function setColor(hex) {
            applyColor(hex);
            reportNote({ color: hex });
        }

        // Build swatches
        COLORS.forEach(color => {
            const s = document.createElement('button');
            s.className = 'swatch';
            s.style.backgroundColor = color;
            s.dataset.color = color;
            s.title = color;
            if (color === activeColor) s.classList.add('active');
            s.addEventListener('click', () => {
                setColor(color);
            });
            swatchContainer.appendChild(s);
        });

        // Custom color input
        customColor.addEventListener('input', () => {
            setColor(customColor.value);
        });

        // Toggle popup
        colorBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            popup.classList.toggle('open');
        });

        // Close popup when clicking outside
        document.addEventListener('click', (e) => {
            if (!popup.contains(e.target) && e.target !== colorBtn) {
                popup.classList.remove('open');
            }
        });

        // Init background
        body.style.backgroundColor = activeColor;

        // Report title + content edits to the store as they happen.
        const editable = document.querySelector('.note-content [contenteditable]');
        document.querySelector('.title-input').addEventListener('input', (e) => {
            reportNote({ title: e.target.value });
        });
        editable.addEventListener('input', (e) => {
            reportNote({ content: e.target.innerHTML });
        });

        // Pasted images must end up as base64 data URLs so the picture lives inside the
        // note's HTML as a self-contained string. A blob: URL (which WebKitGTK inserts on
        // Linux) is only valid in this window's session and becomes a dead reference once
        // the note/app reloads — so it must be inlined here, before the content string
        // ever leaves this window for the store/disk.
        editable.addEventListener('paste', (e) => {
            const items = e.clipboardData && e.clipboardData.items;
            if (items) {
                for (const item of items) {
                    if (!item.type.startsWith('image/')) continue;
                    e.preventDefault();
                    const file = item.getAsFile();
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = () => {
                        insertImageAtCaret(reader.result); // data:<mime>;base64,...
                        reportNote({ content: editable.innerHTML });
                    };
                    reader.readAsDataURL(file);
                    return; // handle the first image in the clipboard
                }
            }
            // Fallback (notably WebKitGTK): the clipboard exposed no image item, so the
            // default paste runs and inserts <img src="blob:...">. Once that lands (next
            // tick), inline any non-data image src into a data URL.
            setTimeout(inlineImages, 0);
        });

        // Convert any <img> whose src isn't already a data: URL (blob:, http:, file:) into
        // a self-contained base64 data URL, then report the updated content. The blob/URL
        // is fetched here in the note window where it's still resolvable.
        async function inlineImages() {
            let changed = false;
            for (const img of editable.querySelectorAll('img')) {
                const src = img.getAttribute('src') || '';
                if (src.startsWith('data:')) continue;
                try {
                    const blob = await (await fetch(src)).blob();
                    const dataUrl = await new Promise((resolve, reject) => {
                        const r = new FileReader();
                        r.onload = () => resolve(r.result);
                        r.onerror = reject;
                        r.readAsDataURL(blob);
                    });
                    img.src = dataUrl;
                    img.style.maxWidth = '100%';
                    changed = true;
                } catch (err) {
                    console.error('could not inline image src', src, err);
                }
            }
            if (changed) reportNote({ content: editable.innerHTML });
        }

        function insertImageAtCaret(dataUrl) {
            const img = document.createElement('img');
            img.src = dataUrl;
            img.style.maxWidth = '100%'; // keep large pastes inside the note
            const sel = window.getSelection();
            if (sel && sel.rangeCount) {
                const range = sel.getRangeAt(0);
                range.deleteContents();
                range.insertNode(img);
                range.setStartAfter(img);
                range.collapse(true);
                sel.removeAllRanges();
                sel.addRange(range);
            } else {
                editable.appendChild(img);
            }
        }

        // React to user moves/resizes (suppressed until hydration completes).
        noteWin.onMoved(({ payload }) => reportNote({ x: payload.x, y: payload.y }));
        noteWin.onResized(({ payload }) => reportNote({ width: payload.width, height: payload.height }));

        // Hydrate from disk. A reopened note loads its saved title/content/colour from
        // its {uuid}.note file (geometry was already restored at window creation). A
        // brand-new note has no file yet, so it instead reports its WM-chosen geometry.
        const titleInput = document.querySelector('.title-input');
        (async () => {
            let saved = null;
            try {
                saved = await window.__TAURI__.core.invoke('get_note', { uuid });
            } catch (e) {
                console.error('get_note failed:', e);
            }

            if (saved) {
                titleInput.value = saved.title || '';
                editable.innerHTML = saved.content || '';
                applyColor(saved.color || activeColor);
                hydrating = false;
            } else {
                hydrating = false;
                const [pos, size] = await Promise.all([noteWin.outerPosition(), noteWin.outerSize()]);
                reportNote({ x: pos.x, y: pos.y, width: size.width, height: size.height });
            }
        })();

        // Wide CSS hit-zones hand off to the native WM resize via a Rust command
        // (start_resize_dragging). Same mechanism as the title-bar startDragging() that
        // already works here, so it's reliable on X11/Wayland regardless of webview geometry.
        document.querySelectorAll('[data-resize]').forEach(el => {
            el.addEventListener('mousedown', e => {
                if (e.button !== 0) return;
                e.preventDefault();
                e.stopPropagation();
                window.__TAURI__.core.invoke('start_resize', { direction: el.dataset.resize });
            });
        });
    </script>
</body>
</html>
